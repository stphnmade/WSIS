prompts:
  - id: "mobile-home-hero"
    use_case: "ui-mockup"
    asset_type: "iPhone 12 mobile redesign concept"
    primary_request: "Create a polished mobile mockup for WSIS, a city decision-support app for a recent graduate comparing Chicago against candidate cities."
    scene_backdrop: "editorial app UI on a clean light device frame, focused on one iPhone 12 screen"
    subject: "home screen with a verdict-first card, hard-constraint chips, Chicago baseline, and two city shortlist cards"
    style_medium: "high-fidelity product UI mockup"
    composition: "single straight-on phone screen, no perspective distortion"
    lighting_mood: "clean daylight product lighting"
    color_palette: "sand, sage, deep ink, clay accent, restrained blue trust callouts"
    text_verbatim:
      - "Should David take this job or keep looking?"
      - "Compare with Chicago"
      - "$70,000 offer"
      - "Rent target: under $980"
      - "Context only"
    constraints:
      - "mobile-first stacked layout"
      - "not a dashboard"
      - "large headline hierarchy"
      - "clear trust badges"
      - "Chicago shown as baseline city"
    avoid:
      - "generic fintech styling"
      - "purple gradients"
      - "tiny table text"
      - "desktop sidebar"

  - id: "mobile-comparison-screen"
    use_case: "ui-mockup"
    asset_type: "iPhone 12 comparison screen"
    primary_request: "Create a mobile comparison screen for WSIS showing Chicago versus one candidate city with a clear recommendation."
    scene_backdrop: "single iPhone 12 UI mockup"
    subject: "stacked comparison cards with verdict, rent gap, weather, downtown vibe, trust and freshness"
    style_medium: "product-ready UI concept"
    composition: "portrait mobile screen, top summary visible in first viewport"
    lighting_mood: "neutral studio light"
    color_palette: "cream, charcoal, muted teal, warm clay highlights"
    text_verbatim:
      - "Chicago vs Raleigh"
      - "Keep looking"
      - "Rent still above target"
      - "Warmth improves"
      - "Downtown energy mixed"
    constraints:
      - "decision-oriented"
      - "single-thumb readable"
      - "full-width cards"
      - "clear confidence row"
    avoid:
      - "wide radar chart as hero"
      - "dense spreadsheet tables"
      - "more than two comparison columns"

  - id: "design-system-board"
    use_case: "productivity-visual"
    asset_type: "design direction board"
    primary_request: "Create a visual design board for a trustworthy relocation-decision app aimed at young adults."
    scene_backdrop: "clean brand board with swatches, typography samples, card examples, and mobile UI snippets"
    subject: "three visual lanes: trust, warmth, urban energy"
    style_medium: "editorial product design board"
    composition: "poster-like board arranged for a product review"
    lighting_mood: "soft neutral light"
    color_palette: "sage, sand, charcoal, clay, pale blue"
    text_verbatim:
      - "Trust"
      - "Warmth"
      - "Urban Energy"
      - "Chicago baseline"
    constraints:
      - "should help frontend engineer build a clearer theme system"
      - "must look premium but practical"
    avoid:
      - "dark mode only"
      - "gaming UI"
      - "luxury travel aesthetic"
